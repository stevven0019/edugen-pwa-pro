<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduGen Personal PRO</title>
<script src="https://cdn.tailwindcss.com"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 SOLO LOGIN SIMPLE
const firebaseConfig = {
  apiKey: "AIzaSyBh_Loi-JCW-P1v7egfSsiP9tAaAv9s6eg",
  authDomain: "edugen-pro-f310f.firebaseapp.com",
  projectId: "edugen-pro-f310f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();

// LOGIN
window.login = async () => {
  await signInWithEmailAndPassword(auth, email.value, pass.value);
};

window.logout = () => signOut(auth);

// SESSION
onAuthStateChanged(auth, (user) => {
  if (user) {
    authDiv.classList.add("hidden");
    appDiv.classList.remove("hidden");
  }
});

// 🧠 PROMPT PRO LESSON PLANNER
function buildPrompt(input){
  return `Eres un experto en planificación educativa AOA (Approach Lesson Planner).

Crea una planificación completa basada en:

${input}

Debe incluir:
- Specific objective
- Learning Outcome
- Desarrollo paso a paso de cada stage ( Warm-up / Pre-task (Engagement, Modeling and Clarification), Presentacion, preparacion, Performance, Assestment y Reflection)
- Actividades dinámicas
- Comments and Observations ( Homework, Formative Assessment of Learning y Teacher's Comments/Observations)
- Recursos

Formato profesional, claro y estructurado.`;
}

// 🤖 GEMINI
window.generate = async () => {
  output.innerText = "Generando planificación...";

  const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=TU_GEMINI_API", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: buildPrompt(idea.value) }] }]
    })
  });

  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Error";

  output.innerText = text;
};

</script>

<style>

.card {

</style>
</head>

<body>

<!-- APP -->
<div id="appDiv" class="hidden p-6 max-w-3xl mx-auto">

  <div class="flex justify-between mb-4">
    <h1 class="text-2xl font-bold">EduGen Personal</h1>
    <button onclick="logout()">Salir</button>
  </div>

  <div class="card">
    <textarea id="idea" placeholder="Tema o clase..." class="w-full p-3 bg-black/40 rounded"></textarea>
    <button onclick="generate()" class="bg-blue-600 mt-3 px-4 py-2 rounded w-full">Generar planificación</button>
    <pre id="output" class="mt-4 whitespace-pre-wrap"></pre>
  </div>

</div>

</body>
