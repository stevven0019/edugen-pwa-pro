<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduGen PRO</title>
<script src="https://cdn.tailwindcss.com"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBh_Loi-JCW-P1v7egfSsiP9tAaAv9s6eg",
  authDomain: "edugen-pro-f310f.firebaseapp.com",
  projectId: "edugen-pro-f310f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let userData = null;
let isAdmin = false;

// LOGIN
window.login = async () => {
  await signInWithEmailAndPassword(auth, email.value, pass.value);
};

// REGISTER + REFERRAL
window.register = async () => {
  const ref = new URLSearchParams(window.location.search).get("ref");
  const userCred = await createUserWithEmailAndPassword(auth, email.value, pass.value);

  await setDoc(doc(db, "users", userCred.user.uid), {
    usos: 10,
    referral: userCred.user.uid,
    referredBy: ref || null
  });

  // Bonus referral
  if (ref) {
    await updateDoc(doc(db, "users", ref), {
      usos: increment(5)
    });
  }
};

window.logout = () => signOut(auth);

// SESSION
onAuthStateChanged(auth, async (user) => {
  if (user) {
    authDiv.classList.add("hidden");
    appDiv.classList.remove("hidden");

    const snap = await getDoc(doc(db, "users", user.uid));
    userData = snap.data();

    usos.innerText = userData.usos;
    referralLink.innerText = location.origin + "?ref=" + user.uid;

    // ADMIN CHECK (pon tu email aquí)
    if (user.email === "admin@email.com") {
      isAdmin = true;
      adminPanel.classList.remove("hidden");
      loadStats();
    }
  }
});

// GEMINI AI
window.generate = async () => {
  if (userData.usos <= 0) return alert("Sin créditos");

  output.innerText = "Generando IA...";

  const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=TU_GEMINI_API", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: [{ parts: [{ text: idea.value }] }] })
  });

  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Error";

  output.innerText = text;

  userData.usos--;
  await updateDoc(doc(db, "users", auth.currentUser.uid), { usos: userData.usos });
  usos.innerText = userData.usos;
};

// ADMIN STATS
async function loadStats() {
  const snapshot = await getDocs(collection(db, "users"));
  totalUsers.innerText = snapshot.size;
}

</script>

<style>
body { background:#020617; color:white; font-family:sans-serif; }
.card { background:rgba(255,255,255,0.05); padding:20px; border-radius:20px; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="authDiv" class="flex items-center justify-center min-h-screen">
<div class="card w-[90%] max-w-md">
<h2>Login</h2>
<input id="email" placeholder="Email" class="w-full p-2 mb-2 bg-black/40">
<input id="pass" type="password" placeholder="Password" class="w-full p-2 mb-2 bg-black/40">
<button onclick="login()" class="bg-blue-600 w-full p-2">Entrar</button>
<button onclick="register()" class="bg-green-600 w-full p-2 mt-2">Crear cuenta</button>
</div>
</div>

<!-- APP -->
<div id="appDiv" class="hidden p-4">
<div class="flex justify-between">
<h1>EduGen PRO</h1>
<button onclick="logout()">Salir</button>
</div>

<div class="card mt-4">
<p>Créditos: <span id="usos"></span></p>
<textarea id="idea" class="w-full p-2 bg-black/40"></textarea>
<button onclick="generate()" class="bg-blue-600 mt-2 p-2">Generar IA</button>
<div id="output" class="mt-3"></div>
</div>

<!-- REFERRAL -->
<div class="card mt-4">
<h3>Invita y gana créditos</h3>
<p id="referralLink"></p>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="hidden card mt-4">
<h3>Admin Dashboard</h3>
<p>Total usuarios: <span id="totalUsers"></span></p>
</div>

</div>

</body>
</html>
